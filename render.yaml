services:
  # Backend API
  - type: web
    name: darvix-api
    runtime: python
    region: oregon
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DARVIX_DATABASE_URL
        fromDatabase:
          name: darvix-db
          property: connectionString
        # Render provides psycopg2 URL; we rewrite to asyncpg in code
      - key: DARVIX_REDIS_URL
        fromService:
          name: darvix-redis
          type: redis
          property: connectionString
      - key: DARVIX_OPENAI_API_KEY
        sync: false
      - key: DARVIX_SECRET_KEY
        generateValue: true
      - key: DARVIX_DEBUG
        value: "false"
      - key: PYTHON_VERSION
        value: "3.12.3"

  # Frontend
  - type: web
    name: darvix-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /api/*
        destination: https://darvix-api.onrender.com/api/*
      - type: rewrite
        source: /ws/*
        destination: https://darvix-api.onrender.com/ws/*
      - type: rewrite
        source: /*
        destination: /index.html

  # Redis
  - type: redis
    name: darvix-redis
    region: oregon
    plan: free
    maxmemoryPolicy: allkeys-lru

databases:
  - name: darvix-db
    region: oregon
    plan: free
    databaseName: darvix
    user: darvix
