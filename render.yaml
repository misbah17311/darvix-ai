services:
  # Single Docker service: FastAPI backend + React frontend
  - type: web
    name: darvix-ai
    runtime: docker
    region: oregon
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DARVIX_DATABASE_URL
        fromDatabase:
          name: darvix-db
          property: connectionString
      - key: DARVIX_REDIS_URL
        fromService:
          name: darvix-redis
          type: redis
          property: connectionString
      - key: DARVIX_OPENAI_API_KEY
        sync: false
      - key: DARVIX_SECRET_KEY
        generateValue: true
      - key: DARVIX_DEBUG
        value: "false"

  # Redis
  - type: redis
    name: darvix-redis
    region: oregon
    plan: free
    maxmemoryPolicy: allkeys-lru

databases:
  - name: darvix-db
    region: oregon
    plan: free
    databaseName: darvix
    user: darvix
