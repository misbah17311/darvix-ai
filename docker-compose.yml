services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - DARVIX_DATABASE_URL=postgresql+asyncpg://darvix:darvix@postgres:5432/darvix
      - DARVIX_REDIS_URL=redis://redis:6379
      - DARVIX_OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - DARVIX_DEBUG=true
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: darvix
      POSTGRES_PASSWORD: darvix
      POSTGRES_DB: darvix
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U darvix"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:
